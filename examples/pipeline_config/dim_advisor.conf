# dim_agent.conf — pipeline transform definition
#
# Two-file pattern:
#   dim_agent.conf          transform definition (region/env agnostic)
#   dim_agent_prod.conf     environment + region binding
#
# The generic pipeline engine interprets this at runtime — no bespoke Spark
# code per table. Adding a new region is a new binding file, not a new job.

pipeline {
  name  = "dim_agent"
  steps = [RegisterUDFs, LoadSourcesWithWatermark, BuildFromSource, MergeUpsert]

  # Inline Spark SQL transform — variables resolved from the binding file
  transform = """
    SELECT
        a.advisor_id,
        a.employee_id,
        a.full_name,
        a.team_id,
        a.division_id,
        a.region_code,
        a.channel,              -- phone | chat | email
        a.status,               -- active | inactive | on_leave
        a.hire_date,
        a.updated_ts,
        current_timestamp()     AS inserted_ts,
        '${region}'             AS data_region
    FROM ${source_schema}.advisors_raw a
    WHERE a.updated_ts > CAST('${watermark}' AS TIMESTAMP)
  """

  merge {
    target-table  = "${target_schema}.dim_agent"
    business-key  = ["advisor_id", "data_region"]
    partition-col = "data_region"
    strategy      = "upsert"              # MATCHED guard on updated_ts
    mode          = "dynamic-overwrite"
  }
}
