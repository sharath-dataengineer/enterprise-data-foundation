# dim_advisor_prod.conf — production environment + US region binding
#
# Includes the shared transform definition and sets env-specific variables.
# To add a new region: copy this file, change `region` and schema/path variables.

include "dim_advisor.conf"

variables {
  source_schema = "source_prod"
  target_schema = "analytics_mart"
  s3_location   = "s3://data-lake-prod/analytics/dim_advisor"
  region        = "US"
}

spark-properties {
  spark.sql.shuffle.partitions          = "200"
  spark.executor.memory                 = "8g"
  spark.executor.cores                  = "4"
  spark.sql.adaptive.enabled            = "true"
  spark.dynamicAllocation.enabled       = "true"
  spark.dynamicAllocation.minExecutors  = "2"
  spark.dynamicAllocation.maxExecutors  = "20"
}
